worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ─── Security: Hide version ───
    server_tokens off;

    # ─── Logging ───
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_user_agent":"$http_user_agent",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── Rate Limiting Zones ───
    # General API: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

    # Auth endpoints: 3 req/s per IP (stricter for login/register)
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=3r/s;

    # ─── Request Body Size Limit ───
    client_max_body_size 1m;

    # ─── Upstream (App Container) ───
    upstream app_backend {
        server app:3000;
    }

    server {
        listen 80;
        server_name _;

        # ─── Generate X-Request-ID ───
        # Propagated to the app and included in all logs
        add_header X-Request-ID $request_id always;
        proxy_set_header X-Request-ID $request_id;

        # ─── Security Headers ───
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # ─── Auth Endpoints (strict rate limit) ───
        location /api/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── OAuth Endpoints ───
        location /api/oauth/ {
            limit_req zone=api_auth burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── All Other API Routes (general rate limit) ───
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://app_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Health Check (no rate limit) ───
        location /api/health {
            proxy_pass http://app_backend;
        }

        # ─── Block all other paths ───
        location / {
            return 404 '{"success":false,"message":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
